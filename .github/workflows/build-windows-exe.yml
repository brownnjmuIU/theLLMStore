name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build (onedir)
        shell: pwsh
        run: |
          $st_static = python -c "import streamlit, os; print(os.path.join(os.path.dirname(streamlit.__file__), 'static'))"
          $st_runtime = python -c "import streamlit, os; print(os.path.join(os.path.dirname(streamlit.__file__), 'runtime'))"
          Write-Host "Streamlit static: $st_static"
          Write-Host "Streamlit runtime: $st_runtime"
          pyinstaller --onedir --name LLM_Bundler `
            --collect-all streamlit `
            --collect-all fitz `
            --collect-all altair `
            --hidden-import streamlit.web.bootstrap `
            --hidden-import streamlit.runtime.scriptrunner `
            --hidden-import docx `
            --hidden-import pptx `
            --collect-all langchain_text_splitters `
            --add-data "$st_static;streamlit/static" `
            --add-data "$st_runtime;streamlit/runtime" `
            --add-data ".streamlit;.streamlit" `
            --add-data "app.py;." `
            --add-data "extractors;extractors" `
            --add-data "processing;processing" `
            --add-data "storage;storage" `
            launcher.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LLM_Bundler_windows_build
          path: dist/LLM_Bundler